name: Build paper

on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/build-paper.yml'
  pull_request:
    paths:
      - 'paper/**'
      - '.github/workflows/build-paper.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for scripted figures)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python figure deps
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib pandas seaborn numpy

      - name: Install SVG → PDF converter
        run: sudo apt-get install -y librsvg2-bin

      - name: Build figures (scripted + SVG)
        working-directory: paper
        run: make figures

      - name: Compile long-form paper (main.pdf)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: paper
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Compile condensed paper (main-condensed.pdf — core submission, rule 17)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main-condensed.tex
          working_directory: paper
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Build arXiv submission tarball (long-form, local-review only — rule 14)
        working-directory: paper
        run: |
          # Re-run latexmk to ensure .bbl is fresh, then package.
          tar --transform 's,^,arxiv-submission/,' \
              -czf arxiv-submission.tar.gz \
              main.tex main.bbl references.bib
          tar -tzf arxiv-submission.tar.gz

      - name: Upload long-form PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf-long-form
          path: paper/main.pdf
          if-no-files-found: error

      - name: Upload condensed PDF (core submission)
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf-condensed
          path: paper/main-condensed.pdf
          if-no-files-found: error

      - name: Upload combined PDF bundle
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdfs
          path: |
            paper/main.pdf
            paper/main-condensed.pdf
          if-no-files-found: error

      - name: Upload arXiv submission tarball
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-submission
          path: paper/arxiv-submission.tar.gz
          if-no-files-found: error
