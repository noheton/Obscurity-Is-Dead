name: Deploy provenance graph site (Pages)

# Deploys docs/site/ (the Cytoscape.js viewer for docs/provenance.ttl)
# to GitHub Pages.
#
# Rule 14 (CLAUDE.md): public deployment of repository artifacts requires
# explicit written consent from the human author (Florian Krebs).  That
# consent was given for THIS site (the provenance-graph viewer) on
# 2026-05-04 in the same session that introduced the Modeler agent and
# the Q13 site build.  It does NOT extend to other rule-14 gates
# (public-mirror push of the full repo, Zenodo deposit, arXiv submission)
# — each remains a separate consent gate.
#
# The workflow rebuilds docs/site/ from docs/provenance.ttl on every
# main-branch push, so the deployed site stays in lock-step with the
# graph the Modeler emits.  Manual runs via workflow_dispatch are also
# permitted.

on:
  push:
    branches: [main]
    paths:
      - 'docs/provenance.ttl'
      - 'docs/site/**'
      - 'scripts/build_provenance_site.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install rdflib
        run: |
          python -m pip install --upgrade pip
          pip install rdflib

      - name: Rebuild docs/site/ from docs/provenance.ttl
        run: python3 scripts/build_provenance_site.py

      - name: Sanity-check graph.json parses
        run: |
          python3 -c "import json; d = json.load(open('docs/site/graph.json')); print(f'OK: {len(d[\"nodes\"])} nodes, {len(d[\"edges\"])} edges')"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
