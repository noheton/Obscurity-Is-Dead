<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  
        <text x="32" y="40" class="lbl-title">Security through obscurity vs. zero-trust / open API</text>

        <line class="hairline" x1="240" y1="58" x2="240" y2="300"></line>

        
        <text x="136" y="72" class="lbl-bold" text-anchor="middle">Security through obscurity</text>

        
        <rect x="56" y="92" width="160" height="180" fill="none" stroke="#000" stroke-width="1.4"></rect>
        <text x="60" y="106" class="lbl-sm">single perimeter</text>

        
        <line x1="56" y1="160" x2="56" y2="170" stroke="#fff" stroke-width="2.4"></line>
        <line x1="216" y1="200" x2="216" y2="210" stroke="#fff" stroke-width="2.4"></line>

        
        <g font-family="inherit">
          <rect x="76" y="140" width="40" height="22" fill="#fff" stroke="#868585" stroke-width="0.8"></rect>
          <text x="96" y="155" class="lbl-sm" text-anchor="middle">device</text>
          <rect x="156" y="140" width="40" height="22" fill="#fff" stroke="#868585" stroke-width="0.8"></rect>
          <text x="176" y="155" class="lbl-sm" text-anchor="middle">device</text>
          <rect x="76" y="186" width="40" height="22" fill="#fff" stroke="#868585" stroke-width="0.8"></rect>
          <text x="96" y="201" class="lbl-sm" text-anchor="middle">device</text>
          <rect x="156" y="186" width="40" height="22" fill="#fff" stroke="#868585" stroke-width="0.8"></rect>
          <text x="176" y="201" class="lbl-sm" text-anchor="middle">device</text>

          
          <line x1="116" y1="151" x2="156" y2="151" stroke="#b1b1b1" stroke-width="0.6"></line>
          <line x1="116" y1="197" x2="156" y2="197" stroke="#b1b1b1" stroke-width="0.6"></line>
          <line x1="96" y1="162" x2="96" y2="186" stroke="#b1b1b1" stroke-width="0.6"></line>
          <line x1="176" y1="162" x2="176" y2="186" stroke="#b1b1b1" stroke-width="0.6"></line>
          <text x="136" y="178" class="lbl-sm" text-anchor="middle">implicit trust</text>
        </g>

        
        <g>
          <circle cx="40" cy="165" r="6" fill="#000"></circle>
          <text x="40" y="184" class="lbl-sm" text-anchor="middle">adversary</text>
          <line x1="46" y1="165" x2="74" y2="165" stroke="#000" stroke-width="1"></line>
          <polygon points="74,165 68,162 68,168" fill="#000"></polygon>
        </g>

        <text x="136" y="288" class="lbl-sm" text-anchor="middle">one breach → full compromise</text>

        
        <text x="360" y="72" class="lbl-bold" text-anchor="middle">Zero-trust &amp; open API</text>

        
        <g font-family="inherit">
          
          <g>
            <rect x="280" y="118" width="44" height="26" fill="#fff" stroke="#00658b" stroke-width="1.2"></rect>
            <text x="302" y="135" class="lbl-sm" text-anchor="middle">device</text>
            <rect x="280" y="110" width="10" height="8" fill="#00658b"></rect>
          </g>
          
          <g>
            <rect x="396" y="118" width="44" height="26" fill="#fff" stroke="#00658b" stroke-width="1.2"></rect>
            <text x="418" y="135" class="lbl-sm" text-anchor="middle">device</text>
            <rect x="396" y="110" width="10" height="8" fill="#00658b"></rect>
          </g>
          
          <g>
            <rect x="280" y="186" width="44" height="26" fill="#fff" stroke="#00658b" stroke-width="1.2"></rect>
            <text x="302" y="203" class="lbl-sm" text-anchor="middle">device</text>
            <rect x="280" y="178" width="10" height="8" fill="#00658b"></rect>
          </g>
          
          <g>
            <rect x="396" y="186" width="44" height="26" fill="#fff" stroke="#00658b" stroke-width="1.2"></rect>
            <text x="418" y="203" class="lbl-sm" text-anchor="middle">device</text>
            <rect x="396" y="178" width="10" height="8" fill="#00658b"></rect>
          </g>

          
          <line x1="324" y1="131" x2="396" y2="131" class="accent-stroke"></line>
          <line x1="324" y1="199" x2="396" y2="199" class="accent-stroke"></line>
          <line x1="302" y1="144" x2="302" y2="186" class="accent-stroke"></line>
          <line x1="418" y1="144" x2="418" y2="186" class="accent-stroke"></line>

          
          <text x="360" y="167" class="lbl-bold" text-anchor="middle" fill="#00658b">mTLS · scoped tokens</text>
          <text x="360" y="178" class="lbl-sm" text-anchor="middle">open spec, every hop verified</text>
        </g>

        
        <g>
          <circle cx="256" cy="245" r="6" fill="#000"></circle>
          <text x="256" y="264" class="lbl-sm" text-anchor="middle">adversary</text>
          <line x1="262" y1="245" x2="278" y2="218" stroke="#000" stroke-width="0.8" stroke-dasharray="2 2"></line>
          <text x="290" y="240" class="lbl-sm">contained</text>
        </g>

        <text x="360" y="288" class="lbl-sm" text-anchor="middle">breach is local · blast radius bounded</text>
      </svg>