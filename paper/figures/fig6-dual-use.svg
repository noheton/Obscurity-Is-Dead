<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 480 320" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
  
        <text x="32" y="40" class="lbl-title">Interoperability gain × Security risk</text>

        
        <rect x="76" y="68" width="340" height="200" fill="#fff" stroke="#000" stroke-width="0.8"></rect>
        <line x1="246" y1="68" x2="246" y2="268" class="hairline"></line>
        <line x1="76" y1="168" x2="416" y2="168" class="hairline"></line>

        
        <text x="246" y="60" class="lbl-axis" text-anchor="middle">interoperability gain  →</text>
        <text x="60" y="168" class="lbl-axis" text-anchor="middle" transform="rotate(-90 60 168)">security risk  →</text>

        
        <text x="80" y="282" class="lbl-tick">low</text>
        <text x="412" y="282" class="lbl-tick" text-anchor="end">high</text>
        <text x="68" y="76" class="lbl-tick" text-anchor="end">high</text>
        <text x="68" y="266" class="lbl-tick" text-anchor="end">low</text>

        
        <text x="160" y="92" class="lbl-sm" text-anchor="middle">attack-only</text>
        <text x="332" y="92" class="lbl-sm" text-anchor="middle">dual-use</text>
        <text x="160" y="260" class="lbl-sm" text-anchor="middle">stagnation</text>
        <text x="332" y="260" class="lbl-sm" text-anchor="middle">open ecosystem</text>

        
        
        <circle cx="356" cy="232" r="5" class="accent-fill"></circle>
        <text x="362" y="234" class="lbl">local HA integration</text>

        
        <circle cx="296" cy="220" r="5" class="accent-fill"></circle>
        <text x="302" y="222" class="lbl">protocol disclosure</text>

        
        <circle cx="370" cy="170" r="5" fill="#666"></circle>
        <text x="376" y="172" class="lbl">cloud bypass</text>

        
        <circle cx="300" cy="108" r="5" fill="#000"></circle>
        <text x="306" y="110" class="lbl">mass-key extraction</text>

        
        <circle cx="148" cy="96" r="5" fill="#000"></circle>
        <text x="154" y="98" class="lbl">untargeted exploit</text>

        
        <circle cx="380" cy="248" r="5" class="accent-fill"></circle>
        <text x="386" y="250" class="lbl">right-to-repair tools</text>

        
        <ellipse cx="332" cy="160" rx="80" ry="56" fill="none" stroke="#000" stroke-width="0.6" stroke-dasharray="3 3"></ellipse>
        <text x="332" y="146" class="lbl-sm" text-anchor="middle">AI broadens reach</text>

        
        <g transform="translate(82 296)">
          <circle cx="6" cy="-2" r="4" class="accent-fill"></circle><text x="14" y="2" class="lbl-sm">interoperability use</text>
          <circle cx="148" cy="-2" r="4" fill="#666"></circle>       <text x="156" y="2" class="lbl-sm">contested</text>
          <circle cx="244" cy="-2" r="4" fill="#000"></circle>       <text x="252" y="2" class="lbl-sm">abuse</text>
        </g>
      </svg>